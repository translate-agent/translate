name: Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: earthbuild/actions-setup@5d323543fa1d7b963384b46b2cbaef0bf6d88216 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Check if Generated Go files are up to date
      - name: GO proto up-to-date
        run: |
          earth --ci +proto
          if ! git diff --quiet; then
            echo "Generated Go files are not up to date"
            git diff --stat
            exit 1
          fi
        # LINT
      - name: Lint Proto
        run: earth --ci +lint-proto
      - name: Lint Migrate
        run: earth --ci +lint-migrate
      - name: Lint GO
        run: earth --ci +lint-go
        # TEST
      - name: Test Unit
        run: earth --ci +test-unit
      - name: Test Migrate
        run: earth --ci +test-migrate
      - name: Test Integration
        env:
          EARTHLY_SECRET_FILES: google_account_key=google_account_key.json
        run: |
          echo ${{ secrets.GOOGLE_ACCOUNT_KEY }} | base64 -d > google_account_key.json
          earth --ci --allow-privileged \
            --secret aws_access_key_id=${{  secrets.AWS_ACCESS_KEY_ID }} \
            --secret aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
             \
            +test-integration
