services:
  mysql:
    image: mysql:9.7.0@sha256:c11782aa2a96624c1efc121768641d96954faa136d6aa82751b032d8c426ffbc
    container_name: mysql
    hostname: mysql
    networks:
      - translate
    ports:
      - 3306:3306
    environment:
      - MYSQL_DATABASE=translate
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    healthcheck:
      test: "mysqladmin status"
      interval: 1s
      timeout: 60s
      retries: 60
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:1.76.0@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    container_name: jaeger
    hostname: jaeger
    networks:
      - translate
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: always

  envoy:
    image: envoyproxy/envoy:v1.38.0@sha256:8146b97ee61a42cd216514709e4e3198af75f014974e3d9f310aef9c901fcbdf
    ports:
      - "8080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    networks:
      - translate
    restart: always

networks:
  translate:
